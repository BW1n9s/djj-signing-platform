<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>DJJ Signing Platform — Wireframes</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Patrick+Hand&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; height: 100%; }
  body { font-family: "Kalam", "Patrick Hand", cursive; -webkit-font-smoothing: antialiased; }
  /* Strip the default outline from contentEditable labels we don't want to look "live". */
  [contenteditable]:focus { outline: none; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="wf-components.jsx"></script>
<script type="text/babel" src="wireframes.jsx"></script>

<script type="text/babel">
const {
  DesignCanvas, DCSection, DCArtboard, DCPostIt,
  IntroCard,
  A_DispatchPaper, A_RentalPaper,
  D_Dispatch, D_Rental,
} = window;

// Phone artboards are 440×900 to give the 402×874 iPhone frame ~20px of
// breathing room (its shadow paints outside the rect). The artboard has
// transparent bg so the warm canvas grid shows through.
const PHONE_W = 440, PHONE_H = 900;
const IPAD_W = 1220, IPAD_H = 860;

function PhoneSlot({ children }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      background: 'transparent',
    }}>{children}</div>
  );
}

function App() {
  const phone = { width: PHONE_W, height: PHONE_H, style: { background: 'transparent', boxShadow: 'none' } };
  const ipad  = { width: IPAD_W,  height: IPAD_H,  style: { background: 'transparent', boxShadow: 'none' } };
  return (
    <DesignCanvas>
      <DCSection id="intro" title="DJJ Signing Platform · Wireframes" subtitle="Chosen: iPhone uses A (paper-form), iPad uses D (split-view)">
        <DCArtboard id="intro-card" label="Brief & system notes" width={860} height={300} style={{ background: 'transparent', boxShadow: 'none' }}>
          <IntroCard />
        </DCArtboard>
      </DCSection>

      <DCSection id="iphone" title="iPhone · A · Paper Form · 纸表式" subtitle="Single long scroll — familiar paper-receipt mental model">
        <DCArtboard id="A1" label="iPhone · Dispatch report" {...phone}><PhoneSlot><A_DispatchPaper /></PhoneSlot></DCArtboard>
        <DCArtboard id="A2" label="iPhone · Rental contract" {...phone}><PhoneSlot><A_RentalPaper /></PhoneSlot></DCArtboard>
      </DCSection>

      <DCSection id="ipad" title="iPad · D · Split View · 双栏" subtitle="Document on the left · persistent signature pad + field nav on the right">
        <DCArtboard id="D1" label="iPad · Dispatch report" {...ipad}><PhoneSlot><D_Dispatch /></PhoneSlot></DCArtboard>
        <DCArtboard id="D2" label="iPad · Rental contract" {...ipad}><PhoneSlot><D_Rental /></PhoneSlot></DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
